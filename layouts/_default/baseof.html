<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | Euroboros Consulting</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Euroboros Consulting provides premium software consulting, DevOps engineering, and cloud architecture services.">
    <meta name="keywords" content="Euroboros Consulting, Software Consulting, DevOps, Cloud Architecture, Platform Engineering, Kubernetes, Terraform, Infrastructure as Code">
    <meta name="author" content="Euroboros Consulting">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }} | Euroboros Consulting">
    <meta property="og:description" content="Precision Engineering. European Reliability. We architect high-performance cloud infrastructure.">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ConsultingService",
      "name": "Euroboros Consulting",
      "url": "{{ .Site.BaseURL }}",
      "logo": "{{ .Site.BaseURL }}logo.png",
      "description": "Elite DevOps engineering and cloud architecture consulting.",
      "areaServed": "Global",
      "knowsAbout": ["DevOps", "Cloud Architecture", "Kubernetes", "Software Consulting", "Platform Engineering"],
      "email": "info@euroborosconsulting.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tallinn",
        "addressCountry": "Estonia"
      }
    }
    </script>
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Canonical URL to ensure search engines use the live URL -->
    <link rel="canonical" href="{{ .Permalink }}" />
    
    <style>
        :root {
            /* Linear/Vercel-inspired Dark Theme */
            --bg-body: #050505;
            --bg-card: #0A0A0A;
            --bg-gradient-start: rgba(120, 119, 198, 0.1);
            --bg-gradient-end: rgba(0, 0, 0, 0);
            
            --border-color: #2a2a2a;
            --border-hover: #444;
            
            --text-primary: #EDEDED;
            --text-secondary: #A1A1A1;
            
            --accent-glow: rgba(64, 124, 255, 0.25);
            --accent-color: #407cff;
            
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 1200px;
            height: 800px;
            background: radial-gradient(circle at center, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 70%);
            z-index: -1;
            pointer-events: none;
        }

        a { color: inherit; text-decoration: none; transition: 0.2s var(--ease); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; position: relative; }
        
        /* Typography */
        h1, h2, h3, h4 { letter-spacing: -0.02em; font-weight: 600; color: var(--text-primary); }
        p { color: var(--text-secondary); font-weight: 400; font-size: 1.05rem; }

        /* Navigation */
        nav { 
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 0;
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 600; font-size: 0.95rem; letter-spacing: -0.01em; display: flex; align-items: center; gap: 0.5rem; }
        /* Euroboros "E" Logo Mark */
        .brand-mark { 
            width: 20px; height: 20px; background: linear-gradient(135deg, #eee, #999); 
            border-radius: 4px; display: grid; place-items: center; color: #000; font-size: 12px; font-weight: 800; 
        }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { font-size: 0.9rem; color: var(--text-secondary); }
        .nav-links a:hover { color: var(--text-primary); }
        
        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.6rem 1.25rem; border-radius: 6px;
            font-size: 0.9rem; font-weight: 500; transition: all 0.2s var(--ease);
            border: 1px solid transparent; cursor: pointer;
        }
        .btn-primary {
            background: #fff; color: #000;
        }
        .btn-primary:hover { background: #e0e0e0; }
        
        .btn-ghost {
            background: rgba(255,255,255,0.05); color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-ghost:hover { border-color: var(--text-secondary); background: rgba(255,255,255,0.08); }

        /* Layout Grid */
        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
        
        /* Cards (Bento Style) */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s var(--ease);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { border-color: var(--border-hover); }
        /* Subtle glow on hover */
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.06), transparent 40%);
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        .card:hover::after { opacity: 1; }

        .card h3 { margin-bottom: 0.5rem; font-size: 1.25rem; }
        .card p { font-size: 0.95rem; line-height: 1.5; color: var(--text-secondary); }
        .card-icon { 
            width: 40px; height: 40px; border-radius: 8px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
            display: grid; place-items: center; margin-bottom: 1.5rem; color: var(--text-primary);
        }

        /* Footer */
        footer { border-top: 1px solid var(--border-color); padding: 4rem 0; margin-top: 8rem; color: var(--text-secondary); font-size: 0.9rem; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4rem; }
        .footer-col h4 { color: var(--text-primary); margin-bottom: 1rem; font-size: 0.9rem; }
        .footer-col ul { list-style: none; }
        .footer-col li { margin-bottom: 0.5rem; }
        .footer-col a:hover { color: var(--text-primary); }

        @media (max-width: 768px) {
            .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
            .nav-links { display: none; }
        }

    </style>
    <!-- Script for hover glow effect -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".card").forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect(), x = e.clientX - rect.left, y = e.clientY - rect.top;
                    card.style.setProperty("--mouse-x", `${x}px`);
                    card.style.setProperty("--mouse-y", `${y}px`);
                }
            });
        });
    </script>
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <a href="/" class="brand">
                <div class="brand-mark">E</div> 
                EUROBOROS
            </a>
            <div class="nav-links">
                <a href="#expertise">Expertise</a>
                <a href="#methodology">Methodology</a>
                <a href="#company">Company</a>
            </div>
            <a href="mailto:info@euroborosconsulting.com" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Contact</a>
        </div>
    </nav>
    {{ block "main" . }}{{ end }}
</body>
</html>
