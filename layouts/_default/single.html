{{ define "main" }}
<div class="container" style="padding-top: 4rem; padding-bottom: 8rem; max-width: 800px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--text-primary);">{{ .Title }}</h1>
    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 3rem;">
        Last updated: {{ .Date.Format "January 2, 2006" }}
    </div>
    
    <div class="content" style="color: var(--text-secondary); line-height: 1.8; font-size: 1.05rem;">
        {{ .Content }}
    </div>
</div>

<style>
    /* basic markdown styling for content pages */
    .content h2 { color: var(--text-primary); margin-top: 2.5rem; margin-bottom: 1rem; font-size: 1.5rem; }
    .content h3 { color: var(--text-primary); margin-top: 2rem; margin-bottom: 1rem; font-size: 1.25rem; }
    .content p { margin-bottom: 1.5rem; }
    .content ul, .content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
    .content li { margin-bottom: 0.5rem; }
    .content strong { color: var(--text-primary); font-weight: 600; }
</style>
{{ end }}
